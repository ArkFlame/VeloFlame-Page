<script>
        const hamburger = document.getElementById('hamburger-button');
        const navMenu = document.getElementById('nav-menu');
        const navLinks = navMenu.querySelectorAll('a');

        // Toggle menu on hamburger click
        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('open');
        });

        // Close menu when a link is clicked
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('open');
            });
        });

        // Fetch and display veloflame.toml
        document.addEventListener('DOMContentLoaded', () => {
            const codeBlock = document.getElementById('toml-content');
            fetch('/veloflame.toml')
              .then(response => {
                  if (!response.ok) {
                      throw new Error(`HTTP error! status: ${response.status}`);
                  }
                  return response.text();
              })
              .then(data => {
                  codeBlock.textContent = data;
                  if (window.Prism) { Prism.highlightElement(codeBlock); }
              })
              .catch(error => {
                  codeBlock.textContent = 'Error: Could not load veloflame.toml.\nPlease ensure the file exists in the root directory.';
                  console.error('Fetch error:', error);
              });
        });
    </script>
