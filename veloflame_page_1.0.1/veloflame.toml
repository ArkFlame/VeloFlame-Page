# VeloFlame PRO only (https://veloflame.com/)
# Slower but more accurate VPN check using online APIs.
[vpn-online]
enabled = true
firewall = true
logs = true
logs-trigger = false
apis = [
    "https://proxycheck.io/v2/{ip}?vpn=1&asn=1",
    "https://funkemunky.cc/vpn?ip={ip}",
    "https://api.ipapi.is/?q={ip}",
]
# If set to true, check will always be active, ignoring trigger-activations.
always-active = true
# Format: "hits:seconds"
# Logic: If hits reached in seconds, activate. Excess hits carry over to next period (capped at hits).
trigger-activations = [
    "30:60",
    "20:30",
    "10:15",
    "6:10",
    "3:5",
    "2:1"
]
# Performance
thread-pool-size = 4
check-timeout-ms = 1000
max-concurrent-checks = 200
write-interval-minutes = 1
whitelist = []

# VeloFlame PRO only (https://veloflame.com/)
# Prevents using many accounts inside the server.
[account]
enabled = true
# Maximum total amount of accounts allowed per IP.
limit = 5
# Maximum online accounts allowed per IP.
concurrent = 3
firewall = true
whitelist = []

# VeloFlame PRO only (https://veloflame.com/)
# Asks new players to reconnect to join.
[reconnect]
enabled = true
firewall = true
# If set to true, check will always be active, ignoring trigger-activations.
always-active = false
# Format: "hits:seconds"
# Logic: If hits reached in seconds, activate. Excess hits carry over to next period (capped at hits).
trigger-activations = [
    "30:60",
    "20:30",
    "10:15",
    "6:10",
    "3:5",
    "2:1"
]
# After this time, player has to reconnect again if failed.
timeout = 10
# If you connect too fast, you will be firewalled.
min-time = 500
# Number of attempts to be able to connect the server.
pings = 1
connections = 1
logs = true
logs-trigger = false
whitelist = []

# VeloFlame PRO only (https://veloflame.com/)
# Analyzes nickname patterns to block bot attacks using similar names.
[nickname]
enabled = true
firewall = true
# If set to true, check will always be active, ignoring trigger-activations.
always-active = false
# Format: "hits:seconds"
# Logic: If hits reached in seconds, activate. Excess hits carry over to next period (capped at hits).
trigger-activations = [
    "30:60",
    "20:30",
    "10:15",
    "6:10",
    "3:5",
    "2:1"
]
# How many recent nicknames to compare against (Default: 10).
memory-size = 10
# Block if too many players have the same prefix. (eg zz_test, zz_bot, bot_test)
same-prefix-block = true
# How many same prefixes to trigger a block (Default: 3).
same-prefix-threshold = 3
# If true, players with similar nicknames will be blocked.
similarity-block = true
# It will only block after 3 nicknames have been flagged.
similarity-match-threshold = 3
# The percentage of similarity required to flag a name (0.70 = 70%).
similarity-threshold = 0.70
# If true, counts similarity only for names with the same length.
similarity-same-length = true
# Block when too many nicknames have the same length eg blah, bloh, bleh
same-length-block = true
# If there is more than 5 nicknames with the exact same length in memory, block
same-length-threshold = 5
logs = true
logs-trigger = false
whitelist = []
